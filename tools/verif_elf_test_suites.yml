# ELF test suite configurations
# Generated by: python tools/gen_elf_tests.py --refer
# Edit this file and re-run gen_elf_tests.py to regenerate .v files.
# Each suite produces one binary that runs a single ELF through
# the specified harness configuration.

versions:
  Zeppelin:
    harness_include: hw/top/test/ZeppelinTestHarness.v
    output_dir: hw/top/test/riscv_dv_asm/elf_suites
    vh_source: hw/top/test/Zeppelin_test/Zeppelin_test_suites.vh
    suites:
    - num: 1
      category: 'Category A: Baseline & Lane Configurations (Suites 1-8)'
      comment: Default baseline (2 FE / 2 BE, 1 ALU / 1 MUL)
      params: {}
    - num: 2
      category: 'Category A: Baseline & Lane Configurations (Suites 1-8)'
      comment: Minimal single-lane (1 FE / 1 BE)
      params:
        p_num_fe_lanes: 1
        p_num_be_lanes: 1
    - num: 3
      category: 'Category A: Baseline & Lane Configurations (Suites 1-8)'
      comment: Wide symmetric (4 FE / 4 BE)
      params:
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
    - num: 4
      category: 'Category A: Baseline & Lane Configurations (Suites 1-8)'
      comment: Non-power-of-2 symmetric (3 FE / 3 BE)
      params:
        p_num_fe_lanes: 3
        p_num_be_lanes: 3
    - num: 5
      category: 'Category A: Baseline & Lane Configurations (Suites 1-8)'
      comment: Narrow fetch, wider commit (1 FE / 2 BE)
      params:
        p_num_fe_lanes: 1
        p_num_be_lanes: 2
    - num: 6
      category: 'Category A: Baseline & Lane Configurations (Suites 1-8)'
      comment: Wide fetch, narrow commit (4 FE / 2 BE)
      params:
        p_num_fe_lanes: 4
        p_num_be_lanes: 2
    - num: 7
      category: 'Category A: Baseline & Lane Configurations (Suites 1-8)'
      comment: Asymmetric non-pow2 + small seq (3 FE / 1 BE, ROB=4)
      params:
        p_num_fe_lanes: 3
        p_num_be_lanes: 1
        p_seq_num_bits: 2
        p_num_phys_regs: 34
    - num: 8
      category: 'Category A: Baseline & Lane Configurations (Suites 1-8)'
      comment: Wide + cross-cut sizing (4 FE / 4 BE, ROB=16, 50 regs)
      params:
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
        p_seq_num_bits: 4
        p_num_phys_regs: 50
    - num: 9
      category: 'Category B: Execution Unit Scaling (Suites 9-14)'
      comment: 'Dual ALU (5 pipes: ALU0, ALU1, MUL0, MEM, CTRL)'
      params:
        p_num_alus: 2
    - num: 10
      category: 'Category B: Execution Unit Scaling (Suites 9-14)'
      comment: 'Quad ALU (7 pipes: ALU0-3, MUL0, MEM, CTRL)'
      params:
        p_num_alus: 4
    - num: 11
      category: 'Category B: Execution Unit Scaling (Suites 9-14)'
      comment: 'Dual MUL (5 pipes: ALU0, MUL0, MUL1, MEM, CTRL)'
      params:
        p_num_muls: 2
    - num: 12
      category: 'Category B: Execution Unit Scaling (Suites 9-14)'
      comment: Dual ALU + Dual MUL, wide
      params:
        p_num_alus: 2
        p_num_muls: 2
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
    - num: 13
      category: 'Category B: Execution Unit Scaling (Suites 9-14)'
      comment: Quad ALU + Dual MUL, wide
      params:
        p_num_alus: 4
        p_num_muls: 2
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
    - num: 14
      category: 'Category B: Execution Unit Scaling (Suites 9-14)'
      comment: Dual ALU + iterative mul, wide
      params:
        p_num_alus: 2
        p_muldivrem_sel: 0
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
    - num: 15
      category: 'Category C: MulDivRem Variants (Suites 15-23)'
      comment: Fully iterative baseline (default 4-pipe config)
      params:
        p_muldivrem_sel: 0
    - num: 16
      category: 'Category C: MulDivRem Variants (Suites 15-23)'
      comment: Fully iterative + deep IQ + deep FIFOs
      params:
        p_muldivrem_sel: 0
        p_iq_depth: 8
        p_f_intf_fifo_depth: 4
        p_x_intf_fifo_depth: 4
        p_alu_d_intf_fifo_depth: 4
        p_mul_d_intf_fifo_depth: 4
        p_mem_d_intf_fifo_depth: 4
    - num: 17
      category: 'Category C: MulDivRem Variants (Suites 15-23)'
      comment: Fully iterative + in-order IQ + bypass all pipes
      params:
        p_muldivrem_sel: 0
        p_all_iq_in_order: 1
        p_pipe_bypass: 1
    - num: 18
      category: 'Category C: MulDivRem Variants (Suites 15-23)'
      comment: Single-cycle mul + iterative div/rem baseline
      params:
        p_muldivrem_sel: 1
    - num: 19
      category: 'Category C: MulDivRem Variants (Suites 15-23)'
      comment: Single-cycle mul + iterative div/rem + deep IQ + deep FIFOs
      params:
        p_muldivrem_sel: 1
        p_iq_depth: 8
        p_f_intf_fifo_depth: 4
        p_x_intf_fifo_depth: 4
        p_alu_d_intf_fifo_depth: 4
        p_mul_d_intf_fifo_depth: 4
        p_mem_d_intf_fifo_depth: 4
    - num: 20
      category: 'Category C: MulDivRem Variants (Suites 15-23)'
      comment: Single-cycle mul + iterative div/rem + in-order IQ + bypass all pipes
      params:
        p_muldivrem_sel: 1
        p_all_iq_in_order: 1
        p_pipe_bypass: 1
    - num: 21
      category: 'Category C: MulDivRem Variants (Suites 15-23)'
      comment: Fully single-cycle baseline
      params:
        p_muldivrem_sel: 2
    - num: 22
      category: 'Category C: MulDivRem Variants (Suites 15-23)'
      comment: Fully single-cycle + deep IQ + deep FIFOs
      params:
        p_muldivrem_sel: 2
        p_iq_depth: 8
        p_f_intf_fifo_depth: 4
        p_x_intf_fifo_depth: 4
        p_alu_d_intf_fifo_depth: 4
        p_mul_d_intf_fifo_depth: 4
        p_mem_d_intf_fifo_depth: 4
    - num: 23
      category: 'Category C: MulDivRem Variants (Suites 15-23)'
      comment: Fully single-cycle + in-order IQ + bypass all pipes
      params:
        p_muldivrem_sel: 2
        p_all_iq_in_order: 1
        p_pipe_bypass: 1
    - num: 24
      category: 'Category D: In-Order IQ & Pipe Bypass (Suites 24-25)'
      comment: All in-order IQ
      params:
        p_all_iq_in_order: 1
    - num: 25
      category: 'Category D: In-Order IQ & Pipe Bypass (Suites 24-25)'
      comment: In-order IQ + 4x4 lanes + F2D backpressure
      params:
        p_all_iq_in_order: 1
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
        p_sim_f2d_bp: '{8''d5, 8''d3, 8''d7, 8''d4}'
    - num: 26
      category: 'Category E: IQ Depth (Suites 26-28)'
      comment: Shallow IQ (depth=2)
      params:
        p_iq_depth: 2
    - num: 27
      category: 'Category E: IQ Depth (Suites 26-28)'
      comment: Deep IQ (depth=8)
      params:
        p_iq_depth: 8
    - num: 28
      category: 'Category E: IQ Depth (Suites 26-28)'
      comment: Shallow IQ + bypass all pipes + small phys regs
      params:
        p_iq_depth: 2
        p_pipe_bypass: 1
        p_num_phys_regs: 34
    - num: 29
      category: 'Category F: FIFO Depths (Suites 29-33)'
      comment: All FIFOs deep (depth=4)
      params:
        p_f_intf_fifo_depth: 4
        p_x_intf_fifo_depth: 4
        p_alu_d_intf_fifo_depth: 4
        p_mul_d_intf_fifo_depth: 4
        p_mem_d_intf_fifo_depth: 4
    - num: 30
      category: 'Category F: FIFO Depths (Suites 29-33)'
      comment: Deep FIFOs + 4x4 lanes + F2D and D2X backpressure
      params:
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
        p_f_intf_fifo_depth: 4
        p_x_intf_fifo_depth: 4
        p_alu_d_intf_fifo_depth: 4
        p_mul_d_intf_fifo_depth: 4
        p_mem_d_intf_fifo_depth: 4
        p_sim_f2d_bp: '{8''d4, 8''d3, 8''d5, 8''d4}'
        p_sim_d2x_bp: '{8''d0, 8''d5, 8''d3, 8''d4}'
    - num: 31
      category: 'Category F: FIFO Depths (Suites 29-33)'
      comment: All FIFOs medium (depth=2)
      params:
        p_f_intf_fifo_depth: 2
        p_x_intf_fifo_depth: 2
        p_alu_d_intf_fifo_depth: 2
        p_mul_d_intf_fifo_depth: 2
        p_mem_d_intf_fifo_depth: 2
    - num: 32
      category: 'Category F: FIFO Depths (Suites 29-33)'
      comment: Mixed FIFOs (F/X deep, D-intfs medium) + 4x4 lanes
      params:
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
        p_f_intf_fifo_depth: 4
        p_x_intf_fifo_depth: 4
        p_alu_d_intf_fifo_depth: 2
        p_mul_d_intf_fifo_depth: 2
        p_mem_d_intf_fifo_depth: 2
    - num: 33
      category: 'Category F: FIFO Depths (Suites 29-33)'
      comment: Deep FIFOs + iterative mul + in-order IQ
      params:
        p_muldivrem_sel: 0
        p_all_iq_in_order: 1
        p_f_intf_fifo_depth: 4
        p_x_intf_fifo_depth: 4
        p_alu_d_intf_fifo_depth: 4
        p_mul_d_intf_fifo_depth: 4
        p_mem_d_intf_fifo_depth: 4
    - num: 34
      category: 'Category G: Sequence Number & Physical Registers (Suites 34-38)'
      comment: Tiny seq (ROB=4, 2-bit seq)
      params:
        p_seq_num_bits: 2
        p_num_phys_regs: 34
    - num: 35
      category: 'Category G: Sequence Number & Physical Registers (Suites 34-38)'
      comment: Small seq (ROB=8, 3-bit seq)
      params:
        p_seq_num_bits: 3
        p_num_phys_regs: 34
    - num: 36
      category: 'Category G: Sequence Number & Physical Registers (Suites 34-38)'
      comment: Medium seq + many regs (ROB=16, 50 regs)
      params:
        p_seq_num_bits: 4
        p_num_phys_regs: 50
    - num: 37
      category: 'Category G: Sequence Number & Physical Registers (Suites 34-38)'
      comment: Large seq (ROB=64, 6-bit seq)
      params:
        p_seq_num_bits: 6
        p_num_phys_regs: 42
    - num: 38
      category: 'Category G: Sequence Number & Physical Registers (Suites 34-38)'
      comment: Medium seq + 4 BE lanes (ROB=16, 48 regs)
      params:
        p_seq_num_bits: 4
        p_num_phys_regs: 48
        p_num_be_lanes: 4
    - num: 39
      category: 'Category H: Reclaim Width & Max In-Flight (Suites 39-43)'
      comment: Narrow reclaim width (slow seq num freeing)
      params:
        p_reclaim_width: 1
    - num: 40
      category: 'Category H: Reclaim Width & Max In-Flight (Suites 39-43)'
      comment: Wide reclaim width (fast seq num freeing)
      params:
        p_reclaim_width: 8
    - num: 41
      category: 'Category H: Reclaim Width & Max In-Flight (Suites 39-43)'
      comment: Low max_in_flight (2)
      params:
        p_max_in_flight: 2
    - num: 42
      category: 'Category H: Reclaim Width & Max In-Flight (Suites 39-43)'
      comment: High max_in_flight (8)
      params:
        p_max_in_flight: 8
    - num: 43
      category: 'Category H: Reclaim Width & Max In-Flight (Suites 39-43)'
      comment: 'Cross-cut: max_in_flight=3, reclaim=2, 3 FE / 3 BE'
      params:
        p_max_in_flight: 3
        p_reclaim_width: 2
        p_num_fe_lanes: 3
        p_num_be_lanes: 3
    - num: 44
      category: 'Category I: Memory Delays (Suites 44-46)'
      comment: Slow memory send (delay=3)
      params:
        p_mem_send_intv_delay: 3
    - num: 45
      category: 'Category I: Memory Delays (Suites 44-46)'
      comment: Slow memory recv (delay=4)
      params:
        p_mem_recv_intv_delay: 4
    - num: 46
      category: 'Category I: Memory Delays (Suites 44-46)'
      comment: Both slow + small seq (send=3, recv=3, ROB=8)
      params:
        p_mem_send_intv_delay: 3
        p_mem_recv_intv_delay: 3
        p_seq_num_bits: 3
    - num: 47
      category: 'Category J: Backpressure (Suites 47-49)'
      comment: F2D backpressure only, 4 FE / 4 BE
      params:
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
        p_sim_f2d_bp: '{8''d3, 8''d5, 8''d3, 8''d7}'
    - num: 48
      category: 'Category J: Backpressure (Suites 47-49)'
      comment: D2X backpressure (ALU + MUL + MEM, not CTRL)
      params:
        p_sim_d2x_bp: '{8''d0, 8''d5, 8''d3, 8''d4}'
    - num: 49
      category: 'Category J: Backpressure (Suites 47-49)'
      comment: X2W backpressure (ALU + MEM)
      params:
        p_sim_x2w_bp: '{8''d0, 8''d4, 8''d0, 8''d3}'
    - num: 50
      category: 'Category K: Stress Combinations (Suites 50-51)'
      comment: Multi-exec stress
      params:
        p_num_alus: 2
        p_num_muls: 2
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
        p_all_iq_in_order: 1
        p_muldivrem_sel: 0
        p_iq_depth: 8
        p_f_intf_fifo_depth: 4
        p_x_intf_fifo_depth: 4
        p_alu_d_intf_fifo_depth: 4
        p_mul_d_intf_fifo_depth: 4
        p_mem_d_intf_fifo_depth: 4
        p_reclaim_width: 2
        p_max_in_flight: 6
        p_seq_num_bits: 4
        p_mem_send_intv_delay: 2
        p_mem_recv_intv_delay: 2
        p_sim_f2d_bp: '{8''d5, 8''d3, 8''d7, 8''d4}'
        p_sim_d2x_bp: '{8''d0, 8''d0, 8''d0, 8''d3, 8''d5, 8''d4}'
        p_sim_x2w_bp: '{8''d0, 8''d4, 8''d0, 8''d0, 8''d3, 8''d0}'
    - num: 51
      category: 'Category K: Stress Combinations (Suites 50-51)'
      comment: Max parallel stress
      params:
        p_num_alus: 4
        p_num_muls: 2
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
        p_seq_num_bits: 4
        p_num_phys_regs: 50
        p_pipe_bypass: 1
        p_iq_depth: 8
        p_f_intf_fifo_depth: 4
        p_x_intf_fifo_depth: 4
        p_alu_d_intf_fifo_depth: 4
        p_mul_d_intf_fifo_depth: 4
        p_mem_d_intf_fifo_depth: 4
        p_reclaim_width: 1
        p_max_in_flight: 8
        p_mem_send_intv_delay: 3
        p_mem_recv_intv_delay: 3
        p_sim_f2d_bp: '{8''d3, 8''d5, 8''d3, 8''d4}'
    - num: 52
      category: 'Category L: Branch Prediction (Suites 52-57)'
      comment: Branch prediction baseline (2 FE / 2 BE, 64-entry BTB)
      params:
        p_enable_branch_pred: 1
    - num: 53
      category: 'Category L: Branch Prediction (Suites 52-57)'
      comment: Branch prediction, single-lane (1 FE / 1 BE)
      params:
        p_enable_branch_pred: 1
        p_num_fe_lanes: 1
        p_num_be_lanes: 1
    - num: 54
      category: 'Category L: Branch Prediction (Suites 52-57)'
      comment: Branch prediction, wide (4 FE / 4 BE)
      params:
        p_enable_branch_pred: 1
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
    - num: 55
      category: 'Category L: Branch Prediction (Suites 52-57)'
      comment: Branch prediction, small BTB (16 entries)
      params:
        p_enable_branch_pred: 1
        p_btb_entries: 16
    - num: 56
      category: 'Category L: Branch Prediction (Suites 52-57)'
      comment: Branch prediction, large BTB (256 entries)
      params:
        p_enable_branch_pred: 1
        p_btb_entries: 256
    - num: 57
      category: 'Category L: Branch Prediction (Suites 52-57)'
      comment: Branch prediction + multi-exec stress
      params:
        p_enable_branch_pred: 1
        p_num_alus: 2
        p_num_muls: 2
        p_num_fe_lanes: 4
        p_num_be_lanes: 4
        p_all_iq_in_order: 1
        p_iq_depth: 8
        p_f_intf_fifo_depth: 4
        p_x_intf_fifo_depth: 4
        p_alu_d_intf_fifo_depth: 4
        p_mul_d_intf_fifo_depth: 4
        p_mem_d_intf_fifo_depth: 4
  ZeppelinV8:
    harness_include: hw/top/test/ZeppelinV8TestHarness.v
    output_dir: hw/top/test/riscv_dv_asm/elf_suites
    vh_source: hw/top/test/ZeppelinV8_test/ZeppelinV8_test_suites.vh
    suites:
    - num: 1
      category: Suite Run Task
      comment: Default (2 ALUs, 2 MULs, 1 LDSTR)
      params: {}
    - num: 2
      category: Suite Run Task
      comment: Minimal (1 ALU, 1 MUL, 1 LDSTR)
      params:
        p_num_alus: 1
        p_num_muls: 1
    - num: 3
      category: Parameter variation test suites
      comment: Small opaq (4-bit), small seq (3-bit), 34 phys regs
      params:
        p_opaq_bits: 4
        p_seq_num_bits: 3
        p_num_phys_regs: 34
    - num: 4
      category: Parameter variation test suites
      comment: Large opaq (32-bit), 4-bit seq, 50 phys regs
      params:
        p_opaq_bits: 32
        p_seq_num_bits: 4
        p_num_phys_regs: 50
    - num: 5
      category: Parameter variation test suites
      comment: Tiny opaq/seq (2/2), 48 phys regs, slow mem recv (3)
      params:
        p_opaq_bits: 2
        p_seq_num_bits: 2
        p_num_phys_regs: 48
        p_mem_recv_intv_delay: 3
    - num: 6
      category: Parameter variation test suites
      comment: 4-bit opaq, 6-bit seq, 42 phys regs, slow mem send/recv (3/3)
      params:
        p_opaq_bits: 4
        p_seq_num_bits: 6
        p_num_phys_regs: 42
        p_mem_send_intv_delay: 3
        p_mem_recv_intv_delay: 3
    - num: 7
      category: FIFO depth and microarchitectural variation suites
      comment: Shallow FIFOs (depth=2 for all inter-stage FIFOs)
      params:
        p_alu_d_intf_fifo_depth: 2
        p_mul_d_intf_fifo_depth: 2
        p_mem_d_intf_fifo_depth: 2
    - num: 8
      category: FIFO depth and microarchitectural variation suites
      comment: Single-entry reclaim width (slower seq num freeing)
      params:
        p_reclaim_width: 1
    - num: 9
      category: FIFO depth and microarchitectural variation suites
      comment: Low max_in_flight (4), stresses issue queue pressure
      params:
        p_max_in_flight: 4
    - num: 10
      category: FIFO depth and microarchitectural variation suites
      comment: Combined stress — shallow FIFOs, low max_in_flight, slow
      params:
        p_reclaim_width: 1
        p_max_in_flight: 4
        p_mem_send_intv_delay: 2
        p_mem_recv_intv_delay: 2
        p_alu_d_intf_fifo_depth: 2
        p_mul_d_intf_fifo_depth: 2
        p_mem_d_intf_fifo_depth: 2
    - num: 11
      category: MulDivRem variant suites
      comment: Single-cycle mul + iterative div/rem
      params:
        p_muldivrem_sel: 1
    - num: 12
      category: MulDivRem variant suites
      comment: Fully single-cycle mul/div/rem
      params:
        p_muldivrem_sel: 2
