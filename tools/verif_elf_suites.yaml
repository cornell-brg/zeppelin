# verif_elf_suites.yaml
# ELF test suite definitions consumed by verif_riscv_dv_batch.py.
#
# Each version entry requires:
#   harness_include  - repo-relative path used in Verilog `include directives
#   suites           - list of suite definitions, each with:
#       num     - integer suite number
#       comment - human-readable description
#       params  - (optional) map of non-default parameter overrides
#
# Verilog byte-concat values (e.g. backpressure vectors) must be quoted
# strings: '{8''d5, 8''d3, 8''d7, 8''d4}'

versions:

  #=========================================================================
  # ZeppelinV8
  #=========================================================================

  ZeppelinV8:
    harness_include: hw/top/test/ZeppelinV8TestHarness.v
    suites:

      # --- Baseline ---

      - num: 1
        comment: Default (1 ALU, 1 MUL, 1 LDSTR)

      - num: 2
        comment: Minimal (1 ALU, 1 MUL, 1 LDSTR)
        params:
          p_num_alus: 1
          p_num_muls: 1

      # --- Parameter variation ---

      - num: 3
        comment: Small opaq (4-bit), small seq (3-bit), 34 phys regs
        params:
          p_opaq_bits:     4
          p_seq_num_bits:  3
          p_num_phys_regs: 34

      - num: 4
        comment: Large opaq (32-bit), 4-bit seq, 50 phys regs
        params:
          p_opaq_bits:     32
          p_seq_num_bits:  4
          p_num_phys_regs: 50

      - num: 5
        comment: Tiny opaq/seq (2/2), 48 phys regs, slow mem recv (3)
        params:
          p_opaq_bits:           2
          p_seq_num_bits:        2
          p_num_phys_regs:       48
          p_mem_recv_intv_delay: 3

      - num: 6
        comment: 4-bit opaq, 6-bit seq, 42 phys regs, slow mem send/recv (3/3)
        params:
          p_opaq_bits:           4
          p_seq_num_bits:        6
          p_num_phys_regs:       42
          p_mem_send_intv_delay: 3
          p_mem_recv_intv_delay: 3

      # --- FIFO depth and microarchitectural variation ---

      - num: 7
        comment: Shallow FIFOs (depth=2 for all inter-stage FIFOs)
        params:
          p_alu_d_intf_fifo_depth: 2
          p_mul_d_intf_fifo_depth: 2
          p_mem_d_intf_fifo_depth: 2

      - num: 8
        comment: Single-entry reclaim width (slower seq num freeing)
        params:
          p_reclaim_width: 1

      - num: 9
        comment: Low max_in_flight (4), stresses issue queue pressure
        params:
          p_max_in_flight: 4

      - num: 10
        comment: Combined stress — shallow FIFOs, low max_in_flight, slow mem, single reclaim
        params:
          p_reclaim_width:         1
          p_max_in_flight:         4
          p_mem_send_intv_delay:   2
          p_mem_recv_intv_delay:   2
          p_alu_d_intf_fifo_depth: 2
          p_mul_d_intf_fifo_depth: 2
          p_mem_d_intf_fifo_depth: 2

      # --- MulDivRem variants ---
      # p_muldivrem_sel: 0=fully iterative  1=single-cycle mul + iterative div/rem  2=fully single-cycle

      - num: 11
        comment: Single-cycle mul + iterative div/rem
        params:
          p_muldivrem_sel: 1

      - num: 12
        comment: Fully single-cycle mul/div/rem
        params:
          p_muldivrem_sel: 2

  #=========================================================================
  # Zeppelin
  #=========================================================================

  Zeppelin:
    harness_include: hw/top/test/ZeppelinTestHarness.v
    suites:

      # --- Category A: Baseline & Lane Configurations (1-8) ---

      - num: 1
        comment: Default baseline (2 FE / 2 BE, 1 ALU / 1 MUL)

      - num: 2
        comment: Minimal single-lane (1 FE / 1 BE)
        params:
          p_num_fe_lanes: 1
          p_num_be_lanes: 1

      - num: 3
        comment: Wide symmetric (4 FE / 4 BE)
        params:
          p_num_fe_lanes: 4
          p_num_be_lanes: 4

      - num: 4
        comment: Non-power-of-2 symmetric (3 FE / 3 BE)
        params:
          p_num_fe_lanes: 3
          p_num_be_lanes: 3

      - num: 5
        comment: Narrow fetch, wider commit (1 FE / 2 BE)
        params:
          p_num_fe_lanes: 1
          p_num_be_lanes: 2

      - num: 6
        comment: Wide fetch, narrow commit (4 FE / 2 BE)
        params:
          p_num_fe_lanes: 4
          p_num_be_lanes: 2

      - num: 7
        comment: Asymmetric non-pow2 + small seq (3 FE / 1 BE, ROB=4)
        params:
          p_num_fe_lanes:  3
          p_num_be_lanes:  1
          p_seq_num_bits:  2
          p_num_phys_regs: 34

      - num: 8
        comment: Wide + cross-cut sizing (4 FE / 4 BE, ROB=16, 50 regs)
        params:
          p_num_fe_lanes:  4
          p_num_be_lanes:  4
          p_seq_num_bits:  4
          p_num_phys_regs: 50

      # --- Category B: Execution Unit Scaling (9-14) ---

      - num: 9
        comment: Dual ALU (5 pipes)
        params:
          p_num_alus: 2

      - num: 10
        comment: Quad ALU (7 pipes)
        params:
          p_num_alus: 4

      - num: 11
        comment: Dual MUL (5 pipes)
        params:
          p_num_muls: 2

      - num: 12
        comment: Dual ALU + Dual MUL, wide (6 pipes, 4x4 lanes)
        params:
          p_num_alus:     2
          p_num_muls:     2
          p_num_fe_lanes: 4
          p_num_be_lanes: 4

      - num: 13
        comment: Quad ALU + Dual MUL, wide (8 pipes, 4x4 lanes)
        params:
          p_num_alus:     4
          p_num_muls:     2
          p_num_fe_lanes: 4
          p_num_be_lanes: 4

      - num: 14
        comment: Dual ALU + iterative mul, wide (5 pipes, 4x4 lanes)
        params:
          p_num_alus:      2
          p_muldivrem_sel: 0
          p_num_fe_lanes:  4
          p_num_be_lanes:  4

      # --- Category C: MulDivRem Variants (15-23) ---
      # p_muldivrem_sel: 0=fully iterative  1=single-cycle mul + iterative div/rem  2=fully single-cycle

      - num: 15
        comment: Fully iterative baseline (default 4-pipe config)
        params:
          p_muldivrem_sel: 0

      - num: 16
        comment: Fully iterative + deep IQ + deep FIFOs
        params:
          p_muldivrem_sel:         0
          p_iq_depth:              8
          p_f_intf_fifo_depth:     4
          p_x_intf_fifo_depth:     4
          p_alu_d_intf_fifo_depth: 4
          p_mul_d_intf_fifo_depth: 4
          p_mem_d_intf_fifo_depth: 4

      - num: 17
        comment: Fully iterative + in-order IQ + bypass all pipes
        params:
          p_muldivrem_sel:   0
          p_all_iq_in_order: 1
          p_pipe_bypass:     1

      - num: 18
        comment: Single-cycle mul + iterative div/rem baseline
        params:
          p_muldivrem_sel: 1

      - num: 19
        comment: Single-cycle mul + iterative div/rem + deep IQ + deep FIFOs
        params:
          p_muldivrem_sel:         1
          p_iq_depth:              8
          p_f_intf_fifo_depth:     4
          p_x_intf_fifo_depth:     4
          p_alu_d_intf_fifo_depth: 4
          p_mul_d_intf_fifo_depth: 4
          p_mem_d_intf_fifo_depth: 4

      - num: 20
        comment: Single-cycle mul + iterative div/rem + in-order IQ + bypass all pipes
        params:
          p_muldivrem_sel:   1
          p_all_iq_in_order: 1
          p_pipe_bypass:     1

      - num: 21
        comment: Fully single-cycle baseline
        params:
          p_muldivrem_sel: 2

      - num: 22
        comment: Fully single-cycle + deep IQ + deep FIFOs
        params:
          p_muldivrem_sel:         2
          p_iq_depth:              8
          p_f_intf_fifo_depth:     4
          p_x_intf_fifo_depth:     4
          p_alu_d_intf_fifo_depth: 4
          p_mul_d_intf_fifo_depth: 4
          p_mem_d_intf_fifo_depth: 4

      - num: 23
        comment: Fully single-cycle + in-order IQ + bypass all pipes
        params:
          p_muldivrem_sel:   2
          p_all_iq_in_order: 1
          p_pipe_bypass:     1

      # --- Category D: In-Order IQ & Pipe Bypass (24-25) ---
      # Note: never put backpressure on CTRL pipe — causes livelock.

      - num: 24
        comment: All in-order IQ
        params:
          p_all_iq_in_order: 1

      - num: 25
        comment: In-order IQ + 4x4 lanes + F2D backpressure
        params:
          p_all_iq_in_order: 1
          p_num_fe_lanes:    4
          p_num_be_lanes:    4
          p_sim_f2d_bp:      '{8''d5, 8''d3, 8''d7, 8''d4}'

      # --- Category E: IQ Depth (26-28) ---

      - num: 26
        comment: Shallow IQ (depth=2)
        params:
          p_iq_depth: 2

      - num: 27
        comment: Deep IQ (depth=8)
        params:
          p_iq_depth: 8

      - num: 28
        comment: Shallow IQ + bypass all pipes + small phys regs
        params:
          p_iq_depth:      2
          p_pipe_bypass:   1
          p_num_phys_regs: 34

      # --- Category F: FIFO Depths (29-33) ---

      - num: 29
        comment: All FIFOs deep (depth=4)
        params:
          p_f_intf_fifo_depth:     4
          p_x_intf_fifo_depth:     4
          p_alu_d_intf_fifo_depth: 4
          p_mul_d_intf_fifo_depth: 4
          p_mem_d_intf_fifo_depth: 4

      - num: 30
        comment: Deep FIFOs + 4x4 lanes + F2D and D2X backpressure
        params:
          p_num_fe_lanes:          4
          p_num_be_lanes:          4
          p_f_intf_fifo_depth:     4
          p_x_intf_fifo_depth:     4
          p_alu_d_intf_fifo_depth: 4
          p_mul_d_intf_fifo_depth: 4
          p_mem_d_intf_fifo_depth: 4
          p_sim_f2d_bp:            '{8''d4, 8''d3, 8''d5, 8''d4}'
          p_sim_d2x_bp:            '{8''d0, 8''d5, 8''d3, 8''d4}'

      - num: 31
        comment: All FIFOs medium (depth=2)
        params:
          p_f_intf_fifo_depth:     2
          p_x_intf_fifo_depth:     2
          p_alu_d_intf_fifo_depth: 2
          p_mul_d_intf_fifo_depth: 2
          p_mem_d_intf_fifo_depth: 2

      - num: 32
        comment: Mixed FIFOs (F/X deep, D-intfs medium) + 4x4 lanes
        params:
          p_num_fe_lanes:          4
          p_num_be_lanes:          4
          p_f_intf_fifo_depth:     4
          p_x_intf_fifo_depth:     4
          p_alu_d_intf_fifo_depth: 2
          p_mul_d_intf_fifo_depth: 2
          p_mem_d_intf_fifo_depth: 2

      - num: 33
        comment: Deep FIFOs + iterative mul + in-order IQ
        params:
          p_muldivrem_sel:         0
          p_all_iq_in_order:       1
          p_f_intf_fifo_depth:     4
          p_x_intf_fifo_depth:     4
          p_alu_d_intf_fifo_depth: 4
          p_mul_d_intf_fifo_depth: 4
          p_mem_d_intf_fifo_depth: 4

      # --- Category G: Sequence Number & Physical Registers (34-38) ---

      - num: 34
        comment: Tiny seq (ROB=4, 2-bit seq)
        params:
          p_seq_num_bits:  2
          p_num_phys_regs: 34

      - num: 35
        comment: Small seq (ROB=8, 3-bit seq)
        params:
          p_seq_num_bits:  3
          p_num_phys_regs: 34

      - num: 36
        comment: Medium seq + many regs (ROB=16, 50 regs)
        params:
          p_seq_num_bits:  4
          p_num_phys_regs: 50

      - num: 37
        comment: Large seq (ROB=64, 6-bit seq)
        params:
          p_seq_num_bits:  6
          p_num_phys_regs: 42

      - num: 38
        comment: Medium seq + 4 BE lanes (ROB=16, 48 regs)
        params:
          p_seq_num_bits:  4
          p_num_phys_regs: 48
          p_num_be_lanes:  4

      # --- Category H: Reclaim Width & Max In-Flight (39-43) ---

      - num: 39
        comment: Narrow reclaim width (slow seq num freeing)
        params:
          p_reclaim_width: 1

      - num: 40
        comment: Wide reclaim width (fast seq num freeing)
        params:
          p_reclaim_width: 8

      - num: 41
        comment: Low max_in_flight (2)
        params:
          p_max_in_flight: 2

      - num: 42
        comment: High max_in_flight (8)
        params:
          p_max_in_flight: 8

      - num: 43
        comment: Cross-cut — max_in_flight=3, reclaim=2, 3 FE / 3 BE
        params:
          p_max_in_flight: 3
          p_reclaim_width: 2
          p_num_fe_lanes:  3
          p_num_be_lanes:  3

      # --- Category I: Memory Delays (44-46) ---

      - num: 44
        comment: Slow memory send (delay=3)
        params:
          p_mem_send_intv_delay: 3

      - num: 45
        comment: Slow memory recv (delay=4)
        params:
          p_mem_recv_intv_delay: 4

      - num: 46
        comment: Both slow + small seq (send=3, recv=3, ROB=8)
        params:
          p_mem_send_intv_delay: 3
          p_mem_recv_intv_delay: 3
          p_seq_num_bits:        3

      # --- Category J: Backpressure (47-49) ---
      # BP vector layout (4 pipes): {CTRL[3], MEM[2], MUL0[1], ALU0[0]}
      # CTRL byte is always 0 to avoid livelock.

      - num: 47
        comment: F2D backpressure only, 4 FE / 4 BE
        params:
          p_num_fe_lanes: 4
          p_num_be_lanes: 4
          p_sim_f2d_bp:   '{8''d3, 8''d5, 8''d3, 8''d7}'

      - num: 48
        comment: D2X backpressure (ALU + MUL + MEM, not CTRL)
        params:
          p_sim_d2x_bp: '{8''d0, 8''d5, 8''d3, 8''d4}'

      - num: 49
        comment: X2W backpressure (ALU + MEM)
        params:
          p_sim_x2w_bp: '{8''d0, 8''d4, 8''d0, 8''d3}'

      # --- Category K: Stress Combinations (50-51) ---

      - num: 50
        comment: Multi-exec stress — 2 ALU + 2 MUL, 4x4, in-order IQ, deep IQ/FIFOs, slow mem, combined BP
        params:
          p_num_alus:              2
          p_num_muls:              2
          p_num_fe_lanes:          4
          p_num_be_lanes:          4
          p_all_iq_in_order:       1
          p_muldivrem_sel:         0
          p_iq_depth:              8
          p_f_intf_fifo_depth:     4
          p_x_intf_fifo_depth:     4
          p_alu_d_intf_fifo_depth: 4
          p_mul_d_intf_fifo_depth: 4
          p_mem_d_intf_fifo_depth: 4
          p_reclaim_width:         2
          p_max_in_flight:         6
          p_seq_num_bits:          4
          p_mem_send_intv_delay:   2
          p_mem_recv_intv_delay:   2
          p_sim_f2d_bp:            '{8''d5, 8''d3, 8''d7, 8''d4}'
          p_sim_d2x_bp:            '{8''d0, 8''d0, 8''d0, 8''d3, 8''d5, 8''d4}'
          p_sim_x2w_bp:            '{8''d0, 8''d4, 8''d0, 8''d0, 8''d3, 8''d0}'

      - num: 51
        comment: Max parallel stress — 4 ALU + 2 MUL, 4x4, bypass, deep IQ/FIFOs, slow mem, narrow reclaim, high MIF, F2D BP
        params:
          p_num_alus:              4
          p_num_muls:              2
          p_num_fe_lanes:          4
          p_num_be_lanes:          4
          p_seq_num_bits:          4
          p_num_phys_regs:         50
          p_pipe_bypass:           1
          p_iq_depth:              8
          p_f_intf_fifo_depth:     4
          p_x_intf_fifo_depth:     4
          p_alu_d_intf_fifo_depth: 4
          p_mul_d_intf_fifo_depth: 4
          p_mem_d_intf_fifo_depth: 4
          p_reclaim_width:         1
          p_max_in_flight:         8
          p_mem_send_intv_delay:   3
          p_mem_recv_intv_delay:   3
          p_sim_f2d_bp:            '{8''d3, 8''d5, 8''d3, 8''d4}'

      # --- Category L: Branch Prediction (52-57) ---

      - num: 52
        comment: Branch prediction baseline (2 FE / 2 BE, 64-entry BTB)
        params:
          p_enable_branch_pred: 1

      - num: 53
        comment: Branch prediction, single-lane (1 FE / 1 BE)
        params:
          p_enable_branch_pred: 1
          p_num_fe_lanes:       1
          p_num_be_lanes:       1

      - num: 54
        comment: Branch prediction, wide (4 FE / 4 BE)
        params:
          p_enable_branch_pred: 1
          p_num_fe_lanes:       4
          p_num_be_lanes:       4

      - num: 55
        comment: Branch prediction, small BTB (16 entries)
        params:
          p_enable_branch_pred: 1
          p_btb_entries:        16

      - num: 56
        comment: Branch prediction, large BTB (256 entries)
        params:
          p_enable_branch_pred: 1
          p_btb_entries:        256

      - num: 57
        comment: Branch prediction + multi-exec stress — 2 ALU + 2 MUL, 4x4, in-order IQ, deep FIFOs
        params:
          p_enable_branch_pred:    1
          p_num_alus:              2
          p_num_muls:              2
          p_num_fe_lanes:          4
          p_num_be_lanes:          4
          p_all_iq_in_order:       1
          p_iq_depth:              8
          p_f_intf_fifo_depth:     4
          p_x_intf_fifo_depth:     4
          p_alu_d_intf_fifo_depth: 4
          p_mul_d_intf_fifo_depth: 4
          p_mem_d_intf_fifo_depth: 4
